name: Deploy Laravel App

on:
  push:
    branches:
      - main # Jalankan aksi ini setiap kali ada push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }} # Biasanya port 22
          script: |
            # Pindah ke folder proyek di dalam server Anda (UBAH PATH INI SESUAI SERVER ANDA)
            cd /var/www/nama_folder_proyek_anda
            
            # Ambil kode terbaru dari GitHub
            git pull origin main
            
            # Install/Update dependensi PHP
            composer install --no-interaction --prefer-dist --optimize-autoloader
            
            # (Opsional) Jalankan migrasi database jika ada perubahan tabel
            php artisan migrate --force
            
            # Bersihkan cache Laravel
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # (Opsional) Build aset frontend (Vite/Tailwind) jika diperlukan
            # npm install
            # npm run build
